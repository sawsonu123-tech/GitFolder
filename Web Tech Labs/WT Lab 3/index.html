<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Registration</title>
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    <!-- Bits ID: 1956www12345 - Heera Thakur   -->
    <header class="page-header">
        <h1>Web Tech Lab 3</h1>
    </header>

    <div id="container">
        <h2>Student Course Registration</h2>

        <!-- Bits ID: 1956www12345 - Heera Thakur -->
        <form id="registrationForm">
            <label for="studentId">Student ID</label>
            <input type="number" id="studentId" placeholder="Enter student ID" min="1" step="1">

            <label for="studentName">Student Name</label>
            <input type="text" id="studentName" placeholder="Enter student name">

            <label for="courseCode">Course Code</label>
            <input type="text" id="courseCode" placeholder="Enter course code">

            <label for="courseTitle">Course Title</label>
            <input type="text" id="courseTitle" placeholder="Enter course title">

            <label for="semester">Semester</label>
            <input type="text" id="semester" placeholder="Enter semester">

            <div class="btn-group">
                <button type="button" id="registerBtn" class="btn submit">Register Course</button>
                <button type="button" id="clearBtn" class="btn reset">Clear Form</button>
                <button type="button" id="exportBtn" class="btn export">Export XML</button>
            </div>
        </form>

        <!-- Bits ID: 1956www12345 - Heera Thakur -->
        <h3>Registered Courses</h3>
        <table class="registration-table">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Course Code</th>
                    <th>Course Title</th>
                    <th>Semester</th>
                </tr>
                
            </thead>
            <tbody id="registrationTable"></tbody>
        </table>
    </div>

    <footer class="footer123">
        <p>Student Name: Heera Thakur | BITS ID: 1956ww254</p>
    </footer>


    <script src="script.js"></script>
</body>
</html>
